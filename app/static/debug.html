<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aastrika Search Debug</title>
  <style>
    :root{--bg:#f4efe6;--panel:#fffdf9;--line:#d8cab9;--text:#201913;--muted:#6c6156;--accent:#0b6e4f}
    *{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",sans-serif;background:linear-gradient(180deg,#fbf8f3,#ede1d0);color:var(--text)}button,input,select,textarea{font:inherit}
    .page{width:min(1200px,calc(100% - 24px));margin:18px auto 28px}.panel{background:rgba(255,253,249,.96);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 14px 30px rgba(46,34,21,.08);margin-bottom:16px}
    .row,.grid,.head,.chips{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.head{justify-content:space-between}.layout{display:grid;grid-template-columns:minmax(0,1.2fr) 360px;gap:16px}.stack{display:grid;gap:14px}
    input[type=text],input[type=password],select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text)}input[type=text],input[type=password],select{min-height:44px;padding:0 14px}textarea{min-height:240px;padding:12px;background:#251b14;color:#f8f2ea}
    button{min-height:44px;border-radius:14px;border:1px solid transparent;padding:0 14px;background:#efe6d8;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),#14885f);color:#fff}.secondary,.ghost{background:#fff;border-color:var(--line)}
    .chip{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:#fff}.hidden{display:none}.muted{color:var(--muted)}.tiny{font-size:.9rem}.cards{display:grid;gap:12px}.card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}
    @media (max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <div class="head">
        <div>
          <h1>Developer Search Debug</h1>
          <p class="muted">Internal search surface for diagnostics, payload inspection, dependency status, and voice-path testing.</p>
        </div>
        <a href="/demo"><button class="secondary" type="button">Open learner UI</button></a>
      </div>
    </section>

    <section class="panel">
      <div class="row">
        <input id="query" type="text" placeholder="Debug query">
        <button id="searchBtn" class="primary" type="button">Search</button>
        <button id="voiceBtn" class="secondary" type="button">Voice</button>
        <button id="uploadBtn" class="ghost" type="button">Upload audio</button>
        <input id="audioInput" class="hidden" type="file" accept="audio/*">
      </div>
      <div class="row" style="margin-top:12px">
        <input id="apiKey" type="password" placeholder="Optional API key">
        <select id="language"><option value="">Any language</option><option value="English">English</option><option value="Hindi">Hindi</option><option value="Tamil">Tamil</option></select>
        <select id="difficulty"><option value="">Any level</option><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
        <select id="sort"><option value="relevance">Relevance</option><option value="recommended">Recommended</option><option value="alphabetical">Alphabetical</option><option value="popularity">Popularity</option><option value="newest">Newest</option></select>
        <label class="chip"><input id="debugToggle" type="checkbox" checked> Include debug</label>
      </div>
    </section>

    <section class="layout">
      <main class="stack">
        <section class="panel">
          <div class="head"><h2>Search summary</h2><span id="summary" class="muted tiny">Idle</span></div>
          <div id="highlights" class="cards" style="margin-top:12px"></div>
        </section>
        <section class="panel">
          <div class="head"><h2>Raw response</h2><button id="clearLog" class="ghost" type="button">Clear logs</button></div>
          <textarea id="responseView" readonly style="margin-top:12px"></textarea>
        </section>
      </main>

      <aside class="stack">
        <section class="panel">
          <div class="head"><h2>Health</h2><button id="refreshHealth" class="secondary" type="button">Refresh</button></div>
          <div id="deps" class="cards" style="margin-top:12px"></div>
        </section>
        <section class="panel">
          <div class="head"><h2>Request log</h2><span id="voiceState" class="muted tiny">Idle</span></div>
          <textarea id="requestLog" readonly style="margin-top:12px"></textarea>
        </section>
      </aside>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let activeRecorder = null;
    const headers = (json) => { const h = {}; const key = $("apiKey").value.trim(); if (key) h["X-API-Key"] = key; if (json) h["Content-Type"] = "application/json"; return h; };
    const log = (msg, payload) => { $("requestLog").value = "[" + new Date().toLocaleTimeString() + "] " + msg + (payload !== undefined ? "\n" + JSON.stringify(payload, null, 2) : "") + "\n\n" + $("requestLog").value; };

    function renderHighlights(payload) {
      const cards = [];
      cards.push('<div class="card"><strong>Original query</strong><div class="muted tiny" style="margin-top:8px">' + (payload.original_query || "-") + "</div></div>");
      cards.push('<div class="card"><strong>Normalized query</strong><div class="muted tiny" style="margin-top:8px">' + (payload.normalized_query || "-") + "</div></div>");
      cards.push('<div class="card"><strong>Corrected query</strong><div class="muted tiny" style="margin-top:8px">' + (payload.corrected_query || payload.did_you_mean || "-") + "</div></div>");
      cards.push('<div class="card"><strong>Detected languages</strong><div class="muted tiny" style="margin-top:8px">' + ((payload.detected_languages || []).join(", ") || "-") + "</div></div>");
      cards.push('<div class="card"><strong>Result count</strong><div class="muted tiny" style="margin-top:8px">' + ((payload.results || []).length) + "</div></div>");
      if (payload.debug_info) cards.push('<div class="card"><strong>Debug info present</strong><div class="muted tiny" style="margin-top:8px">yes</div></div>');
      $("highlights").innerHTML = cards.join("");
    }

    async function runSearch() {
      const query = $("query").value.trim();
      if (!query) return;
      const body = {
        query,
        preferred_language: $("language").value || null,
        filters: { difficulty: $("difficulty").value || null },
        sort: $("sort").value,
        debug: $("debugToggle").checked
      };
      $("summary").textContent = "Searching";
      log("POST /api/v1/search", body);
      try {
        const res = await fetch("/api/v1/search", { method: "POST", headers: headers(true), body: JSON.stringify(body) });
        const payload = await res.json();
        $("responseView").value = JSON.stringify(payload, null, 2);
        if (!res.ok) { $("summary").textContent = "Search failed"; return; }
        $("summary").textContent = ((payload.results || []).length) + " results";
        renderHighlights(payload);
      } catch (e) {
        $("summary").textContent = "Search failed";
        log("Search error", { message: e.message });
      }
    }

    async function fetchHealth() {
      try {
        const res = await fetch("/api/v1/health", { headers: headers(false) });
        const payload = await res.json();
        if (!res.ok) throw new Error("Health failed");
        $("deps").innerHTML = (payload.dependencies || []).map((d) => '<div class="card"><div class="head"><strong>' + d.name + '</strong><span class="chip">' + d.status + '</span></div>' + Object.entries(d.details || {}).map(([k, v]) => '<div class="muted tiny" style="margin-top:8px">' + k + ": " + v + "</div>").join("") + "</div>").join("");
      } catch (e) {
        $("deps").innerHTML = '<div class="card">Health unavailable</div>';
        log("Health error", { message: e.message });
      }
    }

    async function sendVoice(file, filename) {
      $("voiceState").textContent = "Searching";
      const params = new URLSearchParams();
      if ($("language").value) params.set("preferred_language", $("language").value);
      if ($("debugToggle").checked) params.set("debug", "true");
      const form = new FormData(); form.append("file", file, filename);
      log("POST /api/v1/search/voice", { filename });
      try {
        const res = await fetch("/api/v1/search/voice?" + params.toString(), { method: "POST", headers: headers(false), body: form });
        const payload = await res.json();
        $("responseView").value = JSON.stringify(payload, null, 2);
        $("voiceState").textContent = payload.degraded ? "Degraded" : "Ready";
        if (payload.search_response) renderHighlights(payload.search_response);
      } catch (e) {
        $("voiceState").textContent = "Failed";
        log("Voice error", { message: e.message });
      }
    }

    async function startRecording() {
      if (activeRecorder && activeRecorder.state === "recording") {
        activeRecorder.stop();
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === "undefined") { $("voiceState").textContent = "Mic unavailable"; return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const chunks = [];
        const recorder = new MediaRecorder(stream);
        activeRecorder = recorder;
        recorder.ondataavailable = (e) => { if (e.data?.size) chunks.push(e.data); };
        recorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
          $("voiceBtn").textContent = "Voice";
          $("voiceState").textContent = "Transcribing";
          activeRecorder = null;
          await sendVoice(blob, "debug-voice.webm");
        };
        recorder.start();
        $("voiceBtn").textContent = "Stop";
        $("voiceState").textContent = "Listening";
      } catch {
        $("voiceState").textContent = "Mic unavailable";
      }
    }

    $("searchBtn").addEventListener("click", runSearch);
    $("refreshHealth").addEventListener("click", fetchHealth);
    $("clearLog").addEventListener("click", () => { $("requestLog").value = ""; });
    $("query").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); runSearch(); } });
    $("uploadBtn").addEventListener("click", () => $("audioInput").click());
    $("audioInput").addEventListener("change", async () => { const file = $("audioInput").files?.[0]; if (file) await sendVoice(file, file.name); $("audioInput").value = ""; });
    $("voiceBtn").addEventListener("click", startRecording);
    fetchHealth();
  </script>
</body>
</html>
